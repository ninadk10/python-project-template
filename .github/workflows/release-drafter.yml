name: release-drafter

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize


jobs:
  quality:
    name: update-release-draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter
        
        with:
          config-name: release-drafter.yml
        env: 
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write
      pull-requests: write
