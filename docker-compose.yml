services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    volumes:
      - ..:/app                     # live reload — edits reflect instantly
      - /app/.venv                  # exclude venv from bind mount
    ports:
      - "8888:8888"                 # Jupyter notebooks
    env_file:
      - ../.env
    environment:
      - ENV=development
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root

